<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Settings - Ceramic</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ================= System Variables ================= */
        :root {
            --bg-body: #F4F4F6;
            --bg-card: #FFFFFF;
            --bg-input: #F5F5F7;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --text-tertiary: #C7C7CC;
            
            --accent-brand: #000000;
            --accent-blue: #007AFF;
            --accent-red: #FF3B30;
            --accent-purple: #AF52DE;
            
            /* 陶瓷质感阴影 */
            --shadow-card: 
                0 2px 8px rgba(0,0,0,0.02),
                0 8px 24px rgba(0,0,0,0.04),
                0 0 0 1px rgba(0,0,0,0.02);
            
            --ease-spring: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ================= Page Container ================= */
        #chat-settings-page {
            width: 100%;
            max-width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: transparent;
        }

        /* ================= Header ================= */
        .settings-page-header {
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
            /* 渐变模糊背景 */
            background: linear-gradient(to bottom, rgba(244,244,246,0.9) 0%, rgba(244,244,246,0) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
        }

        .settings-page-back-btn, .settings-page-save-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            cursor: pointer;
            transition: transform 0.2s;
            padding: 0;
        }
        .settings-page-back-btn:active, .settings-page-save-btn:active { transform: scale(0.92); }
        .settings-page-back-btn svg, .settings-page-save-btn svg { width: 20px; height: 20px; }

        .settings-page-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        /* ================= Content Scroll ================= */
        .settings-page-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px 120px; /* Bottom padding */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ================= 1. Identity Card (Profile) ================= */
        .profile-header-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }

        /* 装饰性背景光 */
        .profile-header-card::before {
            content: ''; position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,0,0,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .profile-avatar-wrapper {
            position: relative;
            cursor: pointer;
        }

        #chat-settings-avatar {
            width: 100px; height: 100px;
            border-radius: 32px; /* Squircle */
            background: #eee;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border: 4px solid #fff;
            transition: transform 0.3s var(--ease-spring);
        }
        .profile-avatar-wrapper:active #chat-settings-avatar { transform: scale(0.95); }

        .profile-avatar-badge {
            position: absolute; bottom: -6px; right: -6px;
            width: 32px; height: 32px;
            background: var(--text-primary);
            color: #fff;
            border-radius: 50%;
            border: 3px solid #fff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .profile-avatar-badge svg { width: 14px; height: 14px; }

        .profile-info { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 16px; }

        .profile-name-row { display: flex; align-items: center; gap: 8px; }
        .profile-name { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary); }
        .profile-edit-btn {
            background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px;
            transition: color 0.2s;
        }
        .profile-edit-btn:hover { color: var(--text-primary); }
        .profile-edit-btn svg { width: 16px; height: 16px; }

        /* Role Tabs - Segment Control */
        .role-tabs-wrapper {
            background: var(--bg-input);
            padding: 4px;
            border-radius: 99px;
            display: flex;
            position: relative;
            width: 100%; max-width: 240px;
        }
        
        .role-tab-btn {
            flex: 1;
            padding: 8px 0;
            border: none;
            background: transparent;
            border-radius: 99px;
            font-size: 13px; font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative; z-index: 2;
            transition: color 0.3s;
        }
        
        .role-tab-btn.active {
            color: var(--text-primary);
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ================= Forms & Inputs ================= */
        .settings-input-field, .settings-textarea-field {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 15px; font-weight: 500; color: var(--text-primary);
            font-family: inherit;
            outline: none; transition: 0.2s;
        }
        .settings-input-field:focus, .settings-textarea-field:focus {
            background: #fff; border-color: rgba(0,0,0,0.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .settings-textarea-field { resize: none; line-height: 1.5; }

        .character-form-label {
            font-size: 12px; font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 8px; display: block; margin-left: 4px;
        }
        
        .character-form-row { margin-bottom: 16px; }
        .character-form-row:last-child { margin-bottom: 0; }

        /* User Avatar Helper */
        .character-avatar-editor { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .character-avatar-preview { width: 56px; height: 56px; border-radius: 18px; background: #eee; background-size: cover; }
        .character-avatar-upload-btn {
            padding: 8px 16px; background: #fff; border: 1px solid rgba(0,0,0,0.1);
            border-radius: 99px; font-size: 13px; font-weight: 600; color: var(--text-primary);
            cursor: pointer;
        }

        /* ================= Collapsible Sections ================= */
        .collapsible-section {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: all 0.3s var(--ease-spring);
        }

        .collapsible-header {
            padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .collapsible-header:active { background: #FAFAFA; }

        .collapsible-header-left { display: flex; align-items: center; gap: 12px; }
        
        .collapsible-icon {
            width: 36px; height: 36px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
        }
        /* Icon Colors */
        .collapsible-icon.worldbook { background: #34C759; }
        .collapsible-icon.display { background: #007AFF; }
        .collapsible-icon.style { background: #AF52DE; }
        .collapsible-icon.character { background: #FF9500; }
        .collapsible-icon.background { background: #5856D6; }
        .collapsible-icon.other { background: #8E8E93; }
        .collapsible-icon.danger { background: #FF3B30; }

        .collapsible-icon svg { width: 20px; height: 20px; stroke-width: 2px; }
        
        /* 修复有些SVG是fill的，有些是stroke的 */
        .collapsible-icon svg path[fill] { fill: #fff; } 
        .collapsible-icon svg[stroke] { stroke: #fff; }

        .collapsible-title {
            font-size: 16px; font-weight: 600; color: var(--text-primary);
        }

        .collapsible-chevron {
            width: 20px; height: 20px; color: var(--text-tertiary);
            transition: transform 0.3s var(--ease-spring);
        }
        /* Expanded State Logic (assuming class 'expanded' added by JS) */
        .collapsible-section.expanded .collapsible-chevron { transform: rotate(90deg); }
        
        .collapsible-content {
            height: 0; overflow: hidden; opacity: 0;
            transition: all 0.3s var(--ease-spring);
        }
        .collapsible-section.expanded .collapsible-content {
            height: auto; opacity: 1;
        }
        
        .collapsible-inner { padding: 0 20px 24px 20px; }

        /* ================= Toggles (iOS Switch) ================= */
        .setting-item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .setting-item-row:last-child { border-bottom: none; }
        
        .setting-item-label { font-size: 15px; font-weight: 500; color: var(--text-primary); }

        .ios-switch {
            width: 50px; height: 30px;
            background: #E5E5EA;
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .ios-switch::after {
            content: ''; position: absolute;
            width: 26px; height: 26px;
            background: #fff; border-radius: 50%;
            top: 2px; left: 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s var(--ease-spring);
        }
        /* Active State */
        .ios-switch.active { background: #34C759; }
        .ios-switch.active::after { transform: translateX(20px); }

        /* ================= Background Selector & Buttons ================= */
        .bg-preview-box {
            width: 100%; height: 140px;
            background: var(--bg-input);
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border: 2px dashed rgba(0,0,0,0.05);
            transition: 0.2s; position: relative; overflow: hidden;
        }
        .bg-preview-box:hover { border-color: rgba(0,0,0,0.1); }
        
        .bg-preview-placeholder {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: var(--text-tertiary);
        }
        .bg-preview-placeholder span { font-size: 13px; font-weight: 500; }

        .bg-action-btns { display: flex; gap: 12px; margin-top: 12px; }
        .bg-action-btn {
            flex: 1; padding: 12px; border-radius: 14px;
            font-size: 14px; font-weight: 600; border: none; cursor: pointer;
            transition: 0.2s;
        }
        .bg-action-btn:active { transform: scale(0.96); }
        
        .bg-action-btn.primary { background: var(--text-primary); color: #fff; }
        .bg-action-btn.secondary { background: var(--bg-input); color: var(--text-primary); }

        /* Danger Buttons */
        .danger-actions-wrapper { display: flex; flex-direction: column; gap: 12px; }
        .danger-btn {
            width: 100%; padding: 14px; border-radius: 16px;
            font-size: 15px; font-weight: 600; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .danger-btn:active { transform: scale(0.98); opacity: 0.8; }
        
        .danger-btn.purple { background: rgba(175, 82, 222, 0.1); color: var(--accent-purple); }
        .danger-btn.red { background: rgba(255, 59, 48, 0.1); color: var(--accent-red); }

        /* Worldbook tags styling placeholder */
        .worldbook-multiselect-wrapper {
            min-height: 40px; background: var(--bg-input); border-radius: 16px; padding: 8px;
        }

    </style>
</head>
<body>

    <div id="chat-settings-page" class="chat-settings-page">
        
        <!-- Header -->
        <div class="settings-page-header">
            <button id="chat-settings-back-btn" class="settings-page-back-btn">
                <i data-lucide="arrow-left"></i>
            </button>
            <div class="settings-page-title">Settings</div>
            <button id="save-chat-settings-new-btn" class="settings-page-save-btn">
                <i data-lucide="check"></i>
            </button>
        </div>

        <!-- Scroll Content -->
        <div class="settings-page-content hide-scrollbar">
            
            <!-- 1. Identity Monolith -->
            <div class="profile-header-card">
                <div class="profile-avatar-wrapper" onclick="document.getElementById('chat-avatar-upload-input').click()">
                    <div id="chat-settings-avatar" style="background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=Felix');"></div>
                    <input type="file" id="chat-avatar-upload-input" accept="image/*" style="display: none" />
                    <div class="profile-avatar-badge">
                        <i data-lucide="camera"></i>
                    </div>
                </div>
                
                <div class="profile-info">
                    <div class="profile-name-row">
                        <span id="chat-settings-name" class="profile-name">Copilot</span>
                        <button id="edit-chat-name-btn" class="profile-edit-btn">
                            <i data-lucide="edit-2"></i>
                        </button>
                    </div>
                    <!-- Segment Control -->
                    <div class="role-tabs-wrapper">
                        <button id="chat-role-tab-ai" class="role-tab-btn active">AI Character</button>
                        <button id="chat-role-tab-user" class="role-tab-btn">User Profile</button>
                    </div>
                </div>
            </div>

            <!-- AI Form (Expanded by default for demo) -->
            <div id="chat-ai-form" class="collapsible-section expanded">
                <div class="collapsible-content">
                    <div class="collapsible-inner" style="padding-top: 24px;">
                        <div class="character-form-row">
                            <label class="character-form-label">Full Name</label>
                            <input type="text" id="chat-ai-name-input" class="settings-input-field" placeholder="Character Name" />
                        </div>
                        <div class="character-form-row">
                            <label class="character-form-label">System Persona</label>
                            <textarea id="chat-ai-persona-input" class="settings-textarea-field" placeholder="Define behavior..." rows="4"></textarea>
                        </div>
                        <div class="character-form-row">
                            <label class="character-form-label">Memory Depth</label>
                            <input type="number" id="chat-context-memory-input" class="settings-input-field" value="10" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- User Form (Hidden) -->
            <div id="chat-user-form" class="collapsible-section" style="display: none;">
                <!-- (Same structure as AI Form but for User) -->
                <div class="collapsible-content" style="height: auto; opacity: 1;">
                    <div class="collapsible-inner" style="padding-top: 24px;">
                        <div class="character-avatar-editor">
                            <div id="chat-user-avatar-preview" class="character-avatar-preview"></div>
                            <button id="chat-user-avatar-btn" class="character-avatar-upload-btn">Change Avatar</button>
                        </div>
                        <!-- ... inputs ... -->
                    </div>
                </div>
            </div>

            <!-- 2. Worldbook (Collapsible) -->
            <div class="collapsible-section" data-section="worldbook">
                <div class="collapsible-header">
                    <div class="collapsible-header-left">
                        <div class="collapsible-icon worldbook">
                            <i data-lucide="book"></i>
                        </div>
                        <span class="collapsible-title">Worldbook</span>
                    </div>
                    <i data-lucide="chevron-right" class="collapsible-chevron"></i>
                </div>
                <!-- Content hidden by default -->
                <div class="collapsible-content">
                    <div class="collapsible-inner">
                        <div id="chat-worldbook-select-container" class="worldbook-multiselect-wrapper"></div>
                        <div class="setting-item-row" style="margin-top: 12px">
                            <span class="setting-item-label">Load Stickers</span>
                            <div id="chat-wb-stickers-toggle" class="ios-switch"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. Display Settings -->
            <div class="collapsible-section" data-section="display">
                <div class="collapsible-header">
                    <div class="collapsible-header-left">
                        <div class="collapsible-icon display">
                            <i data-lucide="eye"></i>
                        </div>
                        <span class="collapsible-title">Display</span>
                    </div>
                    <i data-lucide="chevron-right" class="collapsible-chevron"></i>
                </div>
                <div class="collapsible-content">
                    <div class="collapsible-inner">
                        <div class="setting-item-row">
                            <span class="setting-item-label">Show Avatars</span>
                            <div id="chat-show-avatars-toggle" class="ios-switch active"></div>
                        </div>
                        <div class="setting-item-row">
                            <span class="setting-item-label">Timestamp</span>
                            <div id="chat-show-timestamp-toggle" class="ios-switch"></div>
                        </div>
                        <div class="setting-item-row">
                            <span class="setting-item-label">Inner Monologue</span>
                            <div id="chat-monologue-toggle" class="ios-switch active"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. Style Settings -->
            <div class="collapsible-section" data-section="style">
                <div class="collapsible-header">
                    <div class="collapsible-header-left">
                        <div class="collapsible-icon style">
                            <i data-lucide="palette"></i>
                        </div>
                        <span class="collapsible-title">Bubble Style</span>
                    </div>
                    <i data-lucide="chevron-right" class="collapsible-chevron"></i>
                </div>
                <div class="collapsible-content">
                    <div class="collapsible-inner">
                        <textarea id="chat-bubble-css-input" class="settings-textarea-field" placeholder="Custom CSS..." rows="4"></textarea>
                        <div class="bg-action-btns">
                            <button id="chat-bubble-preset-btn" class="bg-action-btn primary">Presets</button>
                            <button id="chat-bubble-save-btn" class="bg-action-btn secondary">Save</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 6. Background -->
            <div class="collapsible-section" data-section="background">
                <div class="collapsible-header">
                    <div class="collapsible-header-left">
                        <div class="collapsible-icon background">
                            <i data-lucide="image"></i>
                        </div>
                        <span class="collapsible-title">Wallpaper</span>
                    </div>
                    <i data-lucide="chevron-right" class="collapsible-chevron"></i>
                </div>
                <div class="collapsible-content">
                    <div class="collapsible-inner">
                        <div id="chat-bg-preview-box" class="bg-preview-box">
                            <div id="chat-bg-placeholder" class="bg-preview-placeholder">
                                <i data-lucide="image-plus"></i>
                                <span>Select Image</span>
                            </div>
                        </div>
                        <div class="bg-action-btns">
                            <button id="chat-upload-bg-btn" class="bg-action-btn primary">Upload</button>
                            <button id="chat-clear-bg-btn" class="bg-action-btn secondary">Reset</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 7. Other -->
            <div class="collapsible-section" data-section="other">
                <div class="collapsible-header">
                    <div class="collapsible-header-left">
                        <div class="collapsible-icon other">
                            <i data-lucide="more-horizontal"></i>
                        </div>
                        <span class="collapsible-title">More</span>
                    </div>
                    <i data-lucide="chevron-right" class="collapsible-chevron"></i>
                </div>
                <div class="collapsible-content">
                    <div class="collapsible-inner">
                        <div class="character-form-row">
                            <label class="character-form-label">TTS Voice ID</label>
                            <input type="text" id="chat-tts-voice-input" class="settings-input-field" placeholder="e.g. female-shaonv" />
                        </div>
                        <div class="character-form-row" style="margin-top:12px;">
                            <label class="character-form-label">Language</label>
                            <select id="chat-tts-language-input" class="settings-input-field">
                                <option value="">Auto Detect</option>
                                <option value="zh-CN">Chinese</option>
                                <option value="en-US">English</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 8. Danger Zone -->
            <div class="collapsible-section" data-section="danger">
                <div class="collapsible-header">
                    <div class="collapsible-header-left">
                        <div class="collapsible-icon danger">
                            <i data-lucide="alert-triangle"></i>
                        </div>
                        <span class="collapsible-title">Danger Zone</span>
                    </div>
                    <i data-lucide="chevron-right" class="collapsible-chevron"></i>
                </div>
                <div class="collapsible-content">
                    <div class="collapsible-inner">
                        <div class="danger-actions-wrapper">
                            <button id="chat-block-btn" class="danger-btn purple">
                                <i data-lucide="ban" style="width:16px; margin-right:8px;"></i> Block Contact
                            </button>
                            <button id="chat-clear-history-btn" class="danger-btn red">
                                <i data-lucide="trash-2" style="width:16px; margin-right:8px;"></i> Clear History
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // 简单的折叠逻辑演示 (实际JS需单独写)
        document.querySelectorAll('.collapsible-header').forEach(header => {
            header.addEventListener('click', () => {
                const section = header.parentElement;
                section.classList.toggle('expanded');
            });
        });
    </script>
</body>
</html>
