<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Group Member</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ================= Shared Design System ================= */
        :root {
            --bg-body: #F4F4F6;
            --bg-card: #FFFFFF;
            --bg-input: #F5F5F7;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --accent-black: #000000;
            
            --shadow-modal: 
                0 24px 60px -12px rgba(0,0,0,0.15),
                0 0 0 1px rgba(255,255,255,0.8) inset;
            
            --ease-spring: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-body);
            /* 噪点背景 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }

        .demo-btn { padding: 12px 24px; background: #000; color: #fff; border-radius: 99px; border: none; font-weight: 600; cursor: pointer; }

        /* ================= Modal Styles ================= */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(8px);
            z-index: 1100;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }

        .modal-content {
            width: 90%; max-width: 360px;
            background: var(--bg-card);
            border-radius: 36px;
            padding: 32px 24px;
            box-shadow: var(--shadow-modal);
            transform: scale(0.95) translateY(10px);
            transition: 0.4s var(--ease-spring);
            display: flex; flex-direction: column; gap: 24px;
            position: relative; overflow: hidden;
        }
        .modal-overlay.show .modal-content { transform: scale(1) translateY(0); }

        /* Header */
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .modal-header h2 {
            font-size: 22px; font-weight: 800; color: var(--text-primary); margin: 0; letter-spacing: -0.02em;
        }
        .modal-close-button {
            width: 32px; height: 32px; background: var(--bg-input); border-radius: 50%; border: none;
            color: var(--text-secondary); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; font-size: 20px; padding-bottom: 2px;
        }
        .modal-close-button:hover { background: #E5E5EA; color: #000; }

        /* Avatar Uploader */
        .avatar-uploader {
            position: relative; width: 100px; height: 100px; margin: 0 auto 8px;
            cursor: pointer;
        }
        .avatar-preview {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 32px; /* Squircle */
            background: var(--bg-input);
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .avatar-input { display: none; }
        .avatar-upload-label {
            position: absolute; bottom: -6px; right: -6px;
            width: 32px; height: 32px; background: var(--accent-black);
            border-radius: 50%; border: 3px solid #fff;
            display: flex; align-items: center; justify-content: center;
            color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer; transition: transform 0.2s;
        }
        .avatar-uploader:active .avatar-upload-label { transform: scale(0.9); }

        /* Forms */
        .modal-body { display: flex; flex-direction: column; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label {
            font-size: 12px; font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.05em; margin-left: 4px;
        }
        .form-input, .form-textarea {
            width: 100%; background: var(--bg-input); border: 1px solid transparent;
            border-radius: 16px; padding: 14px 16px;
            font-size: 15px; color: var(--text-primary); font-family: inherit; font-weight: 500;
            outline: none; transition: 0.2s;
        }
        .form-input:focus, .form-textarea:focus { background: #fff; box-shadow: 0 0 0 2px rgba(0,0,0,0.05); }
        .form-textarea { resize: none; line-height: 1.5; }

        /* Footer */
        .modal-footer { margin-top: 8px; }
        .save-button {
            width: 100%; height: 52px; background: var(--accent-black); color: #fff;
            border: none; border-radius: 20px; font-size: 16px; font-weight: 600;
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .save-button:active { transform: scale(0.96); }

    </style>
</head>
<body>

    <button class="demo-btn" onclick="document.getElementById('add-group-member-modal').classList.add('show')">Open Modal 1</button>

    <!-- Modal 1: Add Group Member -->
    <div id="add-group-member-modal" class="modal-overlay" style="z-index: 1100">
        <div class="modal-content">
            
            <div class="modal-header">
                <h2>New Character</h2>
                <button id="add-member-close-btn" class="modal-close-button" onclick="document.getElementById('add-group-member-modal').classList.remove('show')">
                    &times;
                </button>
            </div>

            <div class="modal-body">
                <!-- Avatar -->
                <div class="avatar-uploader">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=NewChar" id="new-member-avatar-preview" class="avatar-preview" />
                    <input type="file" id="new-member-avatar-input" class="avatar-input" accept="image/*" />
                    <label for="new-member-avatar-input" class="avatar-upload-label">
                        <i data-lucide="camera" style="width: 14px;"></i>
                    </label>
                </div>

                <!-- Inputs -->
                <div class="form-group">
                    <label>Character Name</label>
                    <input type="text" id="new-member-name" class="form-input" placeholder="e.g. The Oracle" />
                </div>
                <div class="form-group">
                    <label>Persona & Traits</label>
                    <textarea id="new-member-persona" class="form-textarea" placeholder="Describe personality, backstory..." style="height: 100px"></textarea>
                </div>
            </div>

            <div class="modal-footer">
                <button id="save-new-member-btn" class="save-button">Create Character</button>
            </div>

        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
